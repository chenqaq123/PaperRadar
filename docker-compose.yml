services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      PAPER_RADAR_DB: /app/data/paper_radar.sqlite
      PAPER_RADAR_EMBED_BACKEND: fallback
    volumes:
      - ./data:/app/data
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      VITE_API_BASE: http://127.0.0.1:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend
